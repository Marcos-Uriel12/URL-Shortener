services:
  api:
    build: .
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/blogging_api
      - SECRET_KEY=unaclavesecretamuylargarandom123456
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=blogging_api
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: